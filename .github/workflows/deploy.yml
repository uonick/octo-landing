name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Application version'
        required: true
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure GitHub Pages uses GitHub Actions
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          repository="${{ github.repository }}"
          default_branch="${{ github.event.repository.default_branch }}"
          custom_domain="$(tr -d '[:space:]' < public/CNAME)"

          if ! gh api "repos/${repository}/pages" --silent >/dev/null 2>&1; then
            jq -n \
              --arg branch "${default_branch}" \
              --arg cname "${custom_domain}" \
              '{build_type:"workflow",cname:$cname,source:{branch:$branch,path:"/"}}' \
              | gh api -X POST "repos/${repository}/pages" --input -
          else
            gh api -X PUT "repos/${repository}/pages" \
              -f build_type=workflow \
              -f "cname=${custom_domain}"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '25'

      - name: Install Dependencies
        run: npm ci

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
          fi

      - name: Update version in package.json
        run: npm pkg set version="${{ steps.version.outputs.version }}"

      - name: Build
        run: |
          npm run build-only
          node version.js ${{ steps.version.outputs.version }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
